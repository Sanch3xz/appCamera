<ion-header>
  <ion-toolbar>
    <ion-title>
      Camera
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div class="gallery">
    <div class="photo-card" *ngFor="let photo of photos; let i = index">
      
      <img [src]="photo.image" alt="img">

      <div class="photo-info">
        <div class="photo-date">
          {{photo.date}}
        </div>

        <div class="photo-caption">
          {{photo.caption}}
        </div>

        <ion-button 
          class="delete-btn" 
          size="small" 
          expand="block"
          (click)="deletePhoto(i)">
          Eliminar
        </ion-button>
      </div>

    </div>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="takePicture()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
